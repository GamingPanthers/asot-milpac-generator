services:

  redis:
    image: redis:7-alpine
    container_name: milpac-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - milpac-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  milpac-generator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: milpac-generator
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      # Node Environment
      NODE_ENV: ${NODE_ENV:-production}
      
      # Server Configuration
      PORT: 3000
      IMAGE_OUTPUT_DIR: /app/milpac
      IMAGE_SERVICE_URL: ${IMAGE_SERVICE_URL:-http://localhost:3000}
      
      # MongoDB Connection (Windows Service)
      MONGODB_URI: mongodb://${MONGO_USERNAME:-admin}:${MONGO_PASSWORD:-password}@host.docker.internal:27017/milpac?authSource=admin&maxPoolSize=10&minPoolSize=2&maxIdleTimeMS=45000&retryWrites=true&journal=true
      
      # Redis Configuration
      REDIS_URL: redis://redis:6379
      
      # Web Integration
      WEB_SERVICE_URL: ${WEB_SERVICE_URL:-http://localhost:3001}
      
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ./milpac:/app/milpac
      - ./logs:/app/logs
    networks:
      - milpac-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  redis_data:
    driver: local

networks:
  milpac-network:
    driver: bridge

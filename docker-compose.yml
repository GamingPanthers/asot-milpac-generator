version: '3.8'

services:
  mongo:
    image: mongo:5.0
    container_name: milpac-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: milpac
    volumes:
      - mongo_data:/data/db
    networks:
      - milpac-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: milpac-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - milpac-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data:
    driver: local
  redis_data:
    driver: local

networks:
  milpac-network:
    driver: bridge
